<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <form>
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad" min="0" max="120"><br><br>

        <label for="Género">Género:</label>
        <select id="Género" name="Género"required>
            <option value="">Seleccione</option>
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
            <option value="otro">Otro</option>
        </select> <br><br>

        <label for="intereses">Intereses: <br>
            <input type="checkbox" id="intereses1" name="intereses" value="deportes">
            <label for="deportes">Deportes</label> <br>
            <input type="checkbox" id="intereses2" name="intereses" value="musica">
            <label for="musica">Música</label> <br> 
            <input type="checkbox" id="intereses3" name="intereses" value="tecnologia"> Tecnología <br><br>
        
        <label for="suscripcion">Deseo suscribirme al boletín:</label><br>
        <input type="radio" id="Si" name="suscripcion" value="si">
        <label for="Si">Sí</label> <br>
        <input type="radio" id="No" name="suscripcion" value="no">
        <label for="No">No</label><br><br>

        <label for="Comentarios">Comentarios:</label><br>
        <textarea name="Comentarios" id="Comentarios"></textarea> <br>
        <label for="Archivo">Subir archivo</label> <br>
        <input type="file"  id="Archivo" value="Seleccionar archivo"> <br><br>
        <input type="reset"  value="Limpiar">
        <input type="submit" value="Enviar">
        
    </form>
</body>
</html>
