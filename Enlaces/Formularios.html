<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <form>
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad" min="0" max="120"><br><br>

        <label for="Género">Género:</label>
        <select id="Género" name="Género"required>
            <option value="">Seleccione</option>
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
            <option value="otro">Otro</option>
        </select> <br><br>

        < for="intereses">Intereses: <br>
            <input type="checkbox" id="intereses1" name="intereses" value="deportes">
            <label for="deportes">Deportes</label> <br>
            <input type="checkbox" id="intereses2" name="intereses" value="musica">
            <label for="musica">Música</label> <br> 
            <input type="checkbox" id="intereses3" name="intereses" value="tecnologia"> Tecnología <br><br>
        
        <label for="suscripcion">Deseo suscribirme al boletín:</label><br>
        <input type="radio" id="Si" name="suscripcion" value="si">
        <label for="Si">Sí</label> <br>
        <input type="radio" id="No" name="suscripcion" value="no">
        <label for="No">No</label><br><br>

        <label for="Comentarios">Comentarios:</label><br>
        <textarea name="Comentarios" id="Comentarios"></textarea> <br>
        <label for="Archivo">Subir archivo</label> <br>
        <input type="file"  id="Archivo" value="Seleccionar archivo"> <br><br>

        <label for="email2">Email:</label>
        <input type="email" name="email2" id="email2" placeholder="Introduce tu email" required> <br><br>
        <label for="telefono">Teléfono:</label>
        <input type="tel" name="telefono" id="telefono" placeholder="123 456 789" pattern="[0-9]{9}" required> <br><br>
        <label for="web">Página web:</label>
        <input type="url" name="web" id="web" placeholder="https://www.ejemplo.com" required> <br><br>
        <label for="cantidad">Cantidad (1-10):</label>
        <input type="number" name="cantidad" id="cantidad" min="1" max="10" required> <br><br>
        <label for="rango">Rango (0-100):</label>
        <input type="range" name="rango" id="rango" min="0" max="100" step="20"> <br><br>


        <label for="fecha">Fecha:</label>
        <input type="date" name="fecha" id="fecha" required>
        <label for="hora">Hora:</label>
        <input type="time" name="hora" id="hora" required> <br><br>
        <label for="cita">Cita:</label>
        <input type="datetime-local" name="cita" id="cita" required><br><br>
        <label for="semana">Semana del año:</label>
        <input type="week" name="semana" id="semana" required> <br><br>
        <label for="mes">Mes:</label>
        <input type="month" name="mes" id="mes" required> <br><br>
        
        <label for="color">Color:</label>
        <input type="color" name="color" id="color" value="#ff0000"> <br><br>
        <label for="contraseña">Contraseña:</label>
        <input type="password" name="contraseña" id="contraseña" required> <br><br>
        <label for="buscar">Buscar:</label>
        <input type="search" name="buscar" id="buscar" placeholder="Buscar..."> <br><br>
        <input type="hidden" id="Usuario" name="usuarioID" value="12345"><br><br>

        <label for="usuario">Usuario:</label>
        <input type="text" id="usuario" name="usuario" required> <br><br>
        <label for="codigo postal">Código postal:</label>
        <input type="text" id="codigo postal" name="codigo postal" pattern="[0-9]{5}" placeholder="00000"> <br><br>

        <label for="progreso">Progreso:</label>
        <progress id="progreso" value="25" max="100">25%</progress> <br><br>
        
        <input type="reset"  value="Limpiar">
        <input type="submit" value="Enviar">
        
    </form>
</body>
</html>
