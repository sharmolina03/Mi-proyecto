<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>
<body>
    <ul>
        <li>Elemento 1</li>
        <li>Elemento 2</li>
        <li>Elemento 3</li>
    </ul>
    <ol>
        <li>Primer elemento</li>
        <li>Segundo elemento</li>
        <li>Tercer elemento</li>
    </ol>

    <ul>
        <li>Elemento A</li>
        <ol>
            <li>Subelemento 1</li>
            <li>Subelemento 2</li>
            <ul>
                <li>Subsubelemento 1</li>
                <li>Subsubelemento 2</li>
            </ul>
        </ol>
        <li>Elemento B</li>
        <li>Elemento C</li>
    </ul>
</body>
</html>
